/* ── INDEXEDDB CORE ──────────────────────── */
var DB_NAME = 'DentaLogDB';
var DB_VERSION = 1;
var db;

function initDB() {
  return new Promise((resolve, reject) => {
    var request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains('patients')) db.createObjectStore('patients', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('appts')) db.createObjectStore('appts', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('images')) db.createObjectStore('images', { keyPath: 'id' });
    };
    request.onsuccess = function(e) {
      db = e.target.result;
      resolve(db);
    };
    request.onerror = function(e) { reject(e); };
  });
}

function dbGet(storeName, id) {
  return new Promise((resolve, reject) => {
    var transaction = db.transaction([storeName], 'readonly');
    var store = transaction.objectStore(storeName);
    var request = store.get(id);
    request.onsuccess = function(e) { resolve(e.target.result); };
    request.onerror = function(e) { reject(e); };
  });
}

function dbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    var transaction = db.transaction([storeName], 'readonly');
    var store = transaction.objectStore(storeName);
    var request = store.getAll();
    request.onsuccess = function(e) { resolve(e.target.result); };
    request.onerror = function(e) { reject(e); };
  });
}

function dbPut(storeName, data) {
  return new Promise((resolve, reject) => {
    var transaction = db.transaction([storeName], 'readwrite');
    var store = transaction.objectStore(storeName);
    var request = store.put(data);
    request.onsuccess = function(e) { resolve(e.target.result); };
    request.onerror = function(e) { reject(e); };
  });
}

function dbDel(storeName, id) {
  return new Promise((resolve, reject) => {
    var transaction = db.transaction([storeName], 'readwrite');
    var store = transaction.objectStore(storeName);
    var request = store.delete(id);
    request.onsuccess = function(e) { resolve(e.target.result); };
    request.onerror = function(e) { reject(e); };
  });
}

async function syncToDB() {
  if (!db) return;
  // Sync patients
  for (var id in P) { await dbPut('patients', Object.assign({id: id}, P[id])); }
  // Sync appts
  for (var id in A) { await dbPut('appts', Object.assign({id: id}, A[id])); }
}

async function migrateFromLS() {
  var pKeys = ['dl_p3', 'dl_p2', 'dl_patients_v1', 'dl_patients'];
  var aKeys = ['dl_a3', 'dl_a2', 'dl_appts_v1', 'dl_appts'];
  var migrated = false;
  
  for (var k of pKeys) {
    var val = lsGet(k);
    if (val && Object.keys(val).length > 0) {
      for (var id in val) { await dbPut('patients', Object.assign({id: id}, val[id])); }
      migrated = true;
    }
  }
  for (var k of aKeys) {
    var val = lsGet(k);
    if (val && Object.keys(val).length > 0) {
      for (var id in val) { await dbPut('appts', Object.assign({id: id}, val[id])); }
      migrated = true;
    }
  }
  return migrated;
}

async function loadData() {
  await initDB();
  var patients = await dbGetAll('patients');
  var appts = await dbGetAll('appts');
  
  if (patients.length === 0 && appts.length === 0) {
    var migrated = await migrateFromLS();
    if (migrated) {
      patients = await dbGetAll('patients');
      appts = await dbGetAll('appts');
    }
  }
  
  P = {}; patients.forEach(p => { P[p.id] = p; });
  A = {}; appts.forEach(a => { A[a.id] = a; });
  paint();
}

// Override saveQuiet to also sync to DB
var _origSaveQuiet = saveQuiet;
saveQuiet = function() {
  _origSaveQuiet();
  syncToDB();
};

/* ── IMAGE GALLERY ─────────────────────── */
async function handleImgUpload(el) {
  var files = Array.from(el.files);
  if (files.length === 0) return;
  
  var pending = files.length;
  files.forEach(file => {
    var reader = new FileReader();
    reader.onload = async function(e) {
      var imgData = e.target.result;
      var imgId = uid();
      var imgObj = {
        id: imgId,
        patId: _PF.id,
        data: imgData,
        name: file.name,
        date: today()
      };
      await dbPut('images', imgObj);
      pending--;
      if (pending === 0) {
        toast('🖼 Images uploaded!');
        paintGallery(_PF.id);
      }
    };
    reader.readAsDataURL(file);
  });
  el.value = '';
}

async function paintGallery(patId) {
  var container = document.getElementById('pp-gallery');
  if (!container) return;
  var allImages = await dbGetAll('images');
  var patImages = allImages.filter(img => img.patId === patId);
  
  if (patImages.length === 0) {
    container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:10px;color:var(--mist);font-size:.7rem">No images yet</div>';
    return;
  }
  
  container.innerHTML = patImages.map(img => `
    <div style="position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid var(--ln);background:var(--ln)">
      <img src="${img.data}" style="width:100%;height:100%;object-fit:cover;cursor:pointer" onclick="viewFullImg('${img.id}')">
      <button onclick="delImg('${img.id}')" style="position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(0,0,0,.5);color:#fff;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer">×</button>
    </div>
  `).join('');
}

async function viewFullImg(imgId) {
  var img = await dbGet('images', imgId);
  if (!img) return;
  var w = window.open('');
  w.document.write('<html><head><title>' + esc(img.name) + '</title></head><body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center"><img src="' + img.data + '" style="max-width:100%;max-height:100%"></body></html>');
}

async function delImg(imgId) {
  if (confirm('Delete this image?')) {
    await dbDel('images', imgId);
    toast('Image deleted');
    paintGallery(_PF.id);
  }
}
